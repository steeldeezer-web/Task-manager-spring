<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Task Manager Pro</title>
    <!-- Google Fonts -->
    <link href="https://googleapis.com" rel="stylesheet">
    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://jsdelivr.net">

    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #1c1e21;
            --accent-color: #4e73df;
            --accent-soft: #eaecf4;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-top: 50px;
            padding-bottom: 50px;
        }

        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58, 59, 120, 0.15);
            background: var(--card-bg);
            margin-bottom: 30px;
            padding: 25px;
        }

        .btn-primary {
            background-color: var(--accent-color);
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-weight: 600;
        }

        .form-control, .form-select {
            border-radius: 8px;
            border: 1px solid #d1d3e2;
        }

        .table {
            border-radius: 12px;
            overflow: hidden;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 class="text-center mb-5">🚀 Task Manager System</h1>

    <div class="row">
        <!-- КАРТОЧКА 1: СОЗДАНИЕ ПОЛЬЗОВАТЕЛЯ -->
        <div class="col-md-4">
            <div class="card">
                <h4 class="mb-3">👤 Новый юзер</h4>
                <form th:action="@{/users/add}" method="post">
                    <div class="mb-3">
                        <input type="text" name="name" class="form-control" placeholder="Имя" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Добавить</button>
                </form>
            </div>
        </div>

        <!-- КАРТОЧКА 2: СОЗДАНИЕ ЗАДАЧИ -->
        <div class="col-md-8">
            <div class="card">
                <h4 class="mb-3">✨ Новая задача</h4>
                <form th:action="@{/tasks/add}" method="post" class="row g-3">
                    <div class="col-md-6">
                        <input type="text" name="title" class="form-control" placeholder="Заголовок" required>
                    </div>
                    <div class="col-md-6">
                        <select name="userId" class="form-select" required>
                            <option value="" disabled selected>Исполнитель...</option>
                            <!-- Используем uuid или id в зависимости от твоего класса User -->
                            <option th:each="u : ${users}" th:value="${u.id}" th:text="${u.name}"></option>
                        </select>
                    </div>
                    <div class="col-md-12">
                        <input type="text" name="description" class="form-control" placeholder="Описание">
                    </div>
                    <div class="col-12 text-end">
                        <button type="submit" class="btn btn-primary">Создать задачу</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- ТАБЛИЦА ЗАДАЧ -->
    <div class="card">
        <h4 class="mb-4">📋 Список всех задач</h4>
        <table class="table table-hover">
            <thead class="table-light">
            <tr>
                <th>Заголовок</th>
                <th>Исполнитель</th>
                <th>Статус</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="t : ${tasks}">
                <td th:text="${t.title}"></td>
                <td th:text="${t.user.name}"></td>
                <td>
                    <span class="badge bg-info text-dark" th:text="${t.status}"></span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
